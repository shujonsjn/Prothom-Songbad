<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>প্রথম সংবাদ</title>

<link rel="icon" type="image/svg+xml" href="/img/favicon.svg">
<link rel="apple-touch-icon" href="/img/apple-touch-icon.svg">
<meta name="theme-color" content="#c1131d">

<meta property="og:title" content="প্রথম সংবাদ">
<meta property="og:description" content="বাংলাদেশ ও বিশ্বের নির্ভরযোগ্য সংবাদ">
<meta property="og:type" content="website">
<meta property="og:image" content="/img/logo.svg">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Hind+Siliguri:wght@400;500;600;700&family=Noto+Serif+Bengali:wght@600;700;900&display=swap" rel="stylesheet">

<link rel="stylesheet" href="css/theme.css">

</head>

<body>

<div id="headerBanners" class="full-banner-row"></div>

<div class="topbar">
  <div id="date"></div>
  <div>বাংলাদেশের সর্বশেষ খবর</div>
</div>

<div class="logo-area">
  <a href="/index.html" class="logo-link" aria-label="প্রথম সংবাদ — Home">
    <img src="/img/logo.svg" alt="প্রথম সংবাদ" class="logo-img" width="320" height="88">
  </a>
</div>

<nav class="menu">
  <div class="menu-container" id="navMenu"></div>
</nav>

<div id="subStrip" class="sub-strip"></div>

<div class="container">

  <main>
      <div id="mainNews"></div>

      <div id="inlineBanner1" class="full-banner-row" style="display:none;"></div>

      <div class="news-slider" id="newsSlider" style="display:none;">
        <h2 class="section-title-2">নতুন সংবাদ</h2>
        <div class="slider-viewport">
          <div class="slider-track" id="sliderTrack"></div>
        </div>
        <div class="slider-dots" id="sliderDots"></div>
      </div>

    <div class="read-more" id="readMoreWrap" style="display:none;">
      <h2 class="section-title-2">আরও পড়ুন</h2>
      <ul class="read-more-list" id="readMore"></ul>
      <button class="load-more" id="loadMore">আরও দেখান</button>
    </div>

    <div id="inlineBanner2" class="full-banner-row" style="display:none;"></div>
  </main>

  <aside class="sidebar">
    <h3>সর্বাধিক পঠিত</h3>
    <div id="sideNews"></div>
    <div id="sidebarBanners" class="sidebar-banners"></div>
  </aside>

</div>

<div id="footerBanners" class="full-banner-row"></div>

<footer>
  <h2>প্রথম সংবাদ</h2>
  <p>বাংলাদেশ ও বিশ্বের নির্ভরযোগ্য সংবাদ</p>
  <p class="copy">© ২০২৬ প্রথম সংবাদ — All Rights Reserved</p>
</footer>

<script src="js/subcategories.js"></script>
<script src="js/nav.js"></script>
<script src="js/main.js"></script>

</body>
</html>
