name: Job-2

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Trigger Job-2 cron endpoint
        run: |
          URL="https://prothom-songbad.vercel.app/api/cron-update2?secret=${{ secrets.CRON_SECRET }}"
          echo "Calling $URL"
          RESPONSE=$(curl -sS -w "\nHTTP_STATUS:%{http_code}" "$URL")
          echo "$RESPONSE"
          STATUS=$(echo "$RESPONSE" | tail -1 | sed 's/HTTP_STATUS://')
          if [ "$STATUS" != "200" ]; then
            echo "Cron endpoint returned status $STATUS"
            exit 1
          fi
