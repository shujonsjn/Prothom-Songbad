name: Prothom Alo News Sync

on:
  # প্রতি ১০ মিনিটে: RSS feed থেকে সব ক্যাটাগরির খবর scrape + screenshot + summarize
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Sync news (RSS → screenshot → summarize → DB)
        env:
          TURSO_URL: ${{ secrets.TURSO_URL }}
          TURSO_TOKEN: ${{ secrets.TURSO_TOKEN }}
        run: node scripts/news-sync.mjs
