name: Prothom Alo News Sync

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Step 1 — Fetch & summarize (Vercel API)
        run: |
          URL="https://prothom-songbad.vercel.app/api/cron-update?secret=${{ secrets.CRON_SECRET }}"
          echo "Calling cron-update …"
          curl -sS -w "\nHTTP_STATUS:%{http_code}" "$URL"

      - name: Step 2 — Screenshot articles (Puppeteer)
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          API_URL: "https://prothom-songbad.vercel.app"
        run: node scripts/news-sync.mjs