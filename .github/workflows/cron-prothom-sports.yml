name: Prothom Alo Sports News Sync

on:
  # প্রতি ৬ ঘণ্টায়: 00:00, 06:00, 12:00, 18:00 UTC
  # বাংলাদেশ সময়: 06:00, 12:00, 18:00, 00:00
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Trigger cron endpoint
        run: |
          URL="https://prothom-songbad.vercel.app/api/cron-update?secret=${{ secrets.CRON_SECRET }}"
          echo "Calling $URL"
          RESPONSE=$(curl -sS -w "\nHTTP_STATUS:%{http_code}" "$URL")
          echo "$RESPONSE"
          STATUS=$(echo "$RESPONSE" | tail -1 | sed 's/HTTP_STATUS://')
          if [ "$STATUS" != "200" ]; then
            echo "Cron endpoint returned status $STATUS"
            exit 1
          fi
