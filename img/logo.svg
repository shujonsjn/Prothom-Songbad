<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 88" width="320" height="88" role="img" aria-label="প্রথম সংবাদ">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#c1131d"/>
      <stop offset="100%" stop-color="#8a0a12"/>
    </linearGradient>
    <linearGradient id="paperGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f4eee2"/>
    </linearGradient>
  </defs>

  <!-- Red badge with rounded corners -->
  <rect x="6" y="6" width="76" height="76" rx="14" fill="url(#bgGrad)"/>
  <rect x="6" y="6" width="76" height="76" rx="14" fill="none" stroke="#5a070c" stroke-width="1.2" opacity="0.4"/>

  <!-- Stylized folded newspaper icon -->
  <g transform="translate(18,16)">
    <!-- back page -->
    <path d="M4 6 L36 6 L36 50 L4 50 Z" fill="url(#paperGrad)" opacity="0.85"/>
    <!-- front page (slightly offset) -->
    <path d="M9 10 L48 10 L48 52 L9 52 Z" fill="url(#paperGrad)" stroke="#0a0a0a" stroke-width="1.6" stroke-linejoin="round"/>
    <!-- top masthead bar -->
    <rect x="12" y="14" width="33" height="6" fill="#c1131d"/>
    <!-- text lines on front page -->
    <rect x="12" y="24" width="33" height="2.4" rx="1.2" fill="#0a0a0a" opacity="0.85"/>
    <rect x="12" y="29" width="28" height="2" rx="1" fill="#0a0a0a" opacity="0.6"/>
    <rect x="12" y="33" width="32" height="2" rx="1" fill="#0a0a0a" opacity="0.6"/>
    <rect x="12" y="37" width="24" height="2" rx="1" fill="#0a0a0a" opacity="0.6"/>
    <rect x="12" y="41" width="30" height="2" rx="1" fill="#0a0a0a" opacity="0.6"/>
    <rect x="12" y="45" width="20" height="2" rx="1" fill="#0a0a0a" opacity="0.6"/>
  </g>

  <!-- Wordmark -->
  <g font-family="'Noto Serif Bengali','Hind Siliguri','Tiro Bangla',serif" font-weight="900">
    <text x="98" y="44" font-size="32" fill="#c1131d" letter-spacing="0.5">প্রথম</text>
    <text x="194" y="44" font-size="32" fill="#0a0a0a" letter-spacing="0.5">সংবাদ</text>
  </g>

  <!-- Tagline -->
  <g font-family="'Hind Siliguri',sans-serif" font-weight="500">
    <text x="98" y="64" font-size="11" fill="#5a5a5a" letter-spacing="2.5">বিশ্বস্ত সংবাদের ঠিকানা</text>
  </g>

  <!-- Decorative dot rule under tagline -->
  <g fill="#c1131d">
    <circle cx="98" cy="76" r="1.6"/>
    <circle cx="106" cy="76" r="1.6"/>
    <circle cx="114" cy="76" r="1.6"/>
  </g>
  <rect x="124" y="74.5" width="40" height="3" rx="1.5" fill="#c1131d"/>
  <g fill="#c1131d">
    <circle cx="170" cy="76" r="1.6"/>
    <circle cx="178" cy="76" r="1.6"/>
    <circle cx="186" cy="76" r="1.6"/>
  </g>
</svg>
